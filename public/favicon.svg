<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sky-blue rounded background so the plane reads well in any browser tab colour -->
  <rect width="32" height="32" rx="6" fill="#87CEEB"/>
  <!-- Fuselage -->
  <polygon points="16,2 19.5,26 16,21 12.5,26" fill="#1d4ed8" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Wings -->
  <polygon points="1,16 16,11 31,16 16,18" fill="#1d4ed8" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Tail fins -->
  <polygon points="10,24 16,21 22,24 16,26" fill="#1d4ed8" stroke="white" stroke-width="1" stroke-linejoin="round"/>
</svg>
